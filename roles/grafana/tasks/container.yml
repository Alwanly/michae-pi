---
- name: Pull image from registry
  community.docker.docker_image:
    name: "{{ michae.components.grafana.image }}"
    source: pull

- name: Start and connect container to network
  community.docker.docker_container:
    state: started
    name: grafana
    image: "{{ michae.components.grafana.image }}"
    restart_policy: unless-stopped
    published_ports:
      - "{{ michae.components.grafana.port }}:3000"
    networks:
      - name: "{{ michae.network.name }}"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "{{ michae.components.grafana.password }}"
      GF_USERS_ALLOW_SIGN_UP: "{{ michae.components.grafana.allow_signup | string | lower }}"
      GF_INSTALL_PLUGINS: flant-statusmap-panel,ae3e-plotly-panel
    volumes:
      - "{{ michae.config_dir }}/grafana/data:/var/lib/grafana"
      - "{{ michae.config_dir }}/grafana/provisioning/:/etc/grafana/provisioning/"
      - "{{ michae.config_dir }}/grafana/import_dashboards:/var/lib/grafana/dashboards"
