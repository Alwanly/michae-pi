---
- name: Pull image from registry
  community.docker.docker_image:
    name: "{{ michae.components.exporter_blackbox.image }}"
    source: pull

- name: Start and connect container to network
  community.docker.docker_container:
    state: started
    name: exporter_blackbox
    image: "{{ michae.components.exporter_blackbox.image }}"
    restart_policy: unless-stopped
    command:
      - --config.file=/config/blackbox.yml
    exposed_ports:
      - 9115:9115
    published_ports:
      - "{{ michae.components.exporter_blackbox.port }}:9115"
    networks:
      - name: "{{ michae.network.name }}"
    volumes:
      - "{{ michae.config_dir }}/exporter_blackbox/blackbox.yml:/config/blackbox.yml:ro"
